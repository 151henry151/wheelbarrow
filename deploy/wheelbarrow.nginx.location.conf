# Wheelbarrow MMO — nginx location block
# Add this inside the existing HTTPS server block in /etc/nginx/conf.d/00-hromp.com.conf
# No new cert or DNS record needed — rides on the existing hromp.com certificate.

    location = /wheelbarrow { return 301 $scheme://$host/wheelbarrow/; }
    location /wheelbarrow/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;

        # WebSocket upgrade (required for the game connection)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
        proxy_connect_timeout 60;
    }
