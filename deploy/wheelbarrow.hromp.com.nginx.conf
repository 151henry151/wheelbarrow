# Wheelbarrow MMO — nginx vhost
# Location on server: /etc/nginx/conf.d/wheelbarrow.hromp.com.conf
#
# Before enabling:
#   sudo certbot certonly --nginx -d wheelbarrow.hromp.com
# Then update ssl_certificate paths below to the new cert.

server {
    listen 80;
    listen [::]:80;
    server_name wheelbarrow.hromp.com;

    location /.well-known/acme-challenge/ {
        alias /home/henry/webserver/domains/com/hromp.com/public_html/.well-known/acme-challenge/;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 192.64.87.248:443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wheelbarrow.hromp.com;

    ssl_certificate     /etc/letsencrypt/live/wheelbarrow.hromp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wheelbarrow.hromp.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/wheelbarrow.hromp.com.access.log combined;
    error_log  /var/log/nginx/wheelbarrow.hromp.com.error.log;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;

        # WebSocket upgrade (required for the game connection)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
        proxy_connect_timeout 60;
    }
}
